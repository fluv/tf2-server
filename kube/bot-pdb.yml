---
# The tf2 namespace is excluded from the descheduler profile in fluv/kube, so
# the descheduler will not evict this pod. minAvailable: 0 allows the cluster
# autoscaler to drain the node if it needs to scale down.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tf2-bot
  namespace: tf2
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: tf2-bot

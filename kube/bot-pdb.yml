---
# Stop the cluster descheduler evicting the bot every ~5 minutes, which wipes
# its in-process conversation history (the whole point of the persistent-context
# design). The descheduler evicts via the eviction API, which always honours
# PodDisruptionBudgets -- minAvailable: 1 on the single replica makes the pod
# un-evictable. (The tf2 server survives the descheduler only incidentally, via
# its emptyDir local storage + the descheduler's evictLocalStoragePods: false
# default; the bot has no local storage, so it needs the PDB.)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tf2-bot
  namespace: tf2
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: tf2-bot

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tf2-server-cfg
  namespace: tf2
data:
  server.cfg: |
    echo "ConfigMap loaded"
    sv_lan 0
    sv_region 3
    sv_password ""
    // Logging the bot depends on -- persisted here so a restart keeps it.
    log on
    sv_logecho 1
    // Ship logs to the bot over UDP. Stable via the ClusterIP service so bot
    // pod restarts are transparent (kube-proxy reroutes to the new pod).
    // Literal IP, not the DNS name: srcds's logaddress_add mangles the port
    // when given a hostname (resolves the address fine but truncates the
    // port to a single digit). IP is pinned in kube/service.yaml.
    logaddress_add 10.43.208.74:27115
    // Verbose logging: dominations, revenges, assists, medic/uber events.
    // Interval is high so the position_report firehose is choked at source
    // (the bot drops position_report anyway).
    log_verbose_enable 1
    log_verbose_interval 300

    tf_bot_quota 12
    tf_bot_quota_mode fill
    bot_join_after_player 0
    tf_bot_offline_practice 1
    mp_waitingforplayers_cancel 1
  mapcycle.txt: |
    cp_dustbowl
    cp_badlands
    ctf_turbine
    koth_viaduct
    pl_badwater

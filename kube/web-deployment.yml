---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tf2-web
  namespace: tf2
  labels:
    app: tf2-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tf2-web
  template:
    metadata:
      labels:
        app: tf2-web
    spec:
      containers:
        - name: tf2-web
          image: ghcr.io/fluv/tf2-web:latest
          ports:
            - name: http
              containerPort: 3000
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: TF2_PORT
              value: "30015"
            - name: MAPCYCLE_PATH
              value: /etc/tf2/mapcycle.txt
          volumeMounts:
            - name: server-cfg
              mountPath: /etc/tf2/mapcycle.txt
              subPath: mapcycle.txt
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      terminationGracePeriodSeconds: 10
      volumes:
        - name: server-cfg
          configMap:
            name: tf2-server-cfg
            items:
              - key: mapcycle.txt
                path: mapcycle.txt

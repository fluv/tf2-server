apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tf2-server
  namespace: tf2
  labels:
    release: prometheus
spec:
  groups:
    - name: tf2-server
      rules:
        - alert: TF2ServerDown
          expr: kube_deployment_status_replicas_available{namespace="tf2",deployment="tf2"} == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "TF2 game server is unavailable"
            description: "The tf2 deployment has had zero available replicas for 2 minutes."
        - alert: TF2WebDown
          expr: kube_deployment_status_replicas_available{namespace="tf2",deployment="tf2-web"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "TF2 web interface is unavailable"
            description: "The tf2-web deployment has had zero available replicas for 5 minutes."

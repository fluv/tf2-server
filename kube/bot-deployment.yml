---
# tf2-bot — headless DeepSeek-backed heckler. Receives server logs over UDP via
# Source Engine logaddress_add, talks back via rcon. Needs NO k8s API access.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tf2-bot
  namespace: tf2
  labels:
    app: tf2-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tf2-bot
  template:
    metadata:
      labels:
        app: tf2-bot
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64  # claude-code/node, match the server
      containers:
        - name: tf2-bot
          image: ghcr.io/fluv/tf2-bot:latest  # tag kept in sync with bot-image.yml
          env:
            # DeepSeek key. AUTH_TOKEN (not API_KEY) so it's sent as Bearer with
            # no interactive prompt. Mint the secret to match (key below).
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tf2-bot
                  key: deepseek-api-key
            - name: ANTHROPIC_MODEL
              value: deepseek-v4-flash
            # rcon password — reuse the server's existing secret by reference.
            - name: RCON_PASS
              valueFrom:
                secretKeyRef:
                  name: srcds
                  key: rcon
            # System prompt = mechanical contract + character, each from its own
            # ConfigMap file so they retune independently without a rebuild.
            - name: BOT_MECHANICAL_FILE
              value: /config/mechanical.txt
            - name: BOT_CHARACTER_FILE
              value: /config/character.txt
          ports:
            - containerPort: 27115
              protocol: UDP
              name: log-udp
          volumeMounts:
            - name: prompt
              mountPath: /config
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 1Gi  # node + a claude-code invocation per trigger
      volumes:
        - name: prompt
          configMap:
            name: tf2-bot-cfg
      terminationGracePeriodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: tf2
  namespace: tf2
spec:
  type: NodePort
  selector:
    app: tf2
  ports:
    - port: 27015
      targetPort: 27015
      # vanilla k8s nodeports are 30000-32767 so we can't use 27015:
      nodePort: 30015
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: tf2-rcon
  namespace: tf2
spec:
  type: ClusterIP
  selector:
    app: tf2
  ports:
    - port: 27015
      targetPort: 27015
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: tf2-rcon-ts
  namespace: tf2
  annotations:
    tailscale.com/hostname: "tf2-rcon"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: tf2
  ports:
    - port: 27015
      targetPort: 27015
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: tf2-bot
  namespace: tf2
spec:
  type: ClusterIP
  # Pinned: server.cfg's logaddress_add targets this IP literally (see
  # kube/configmap.yml) because srcds mangles the port when given a
  # hostname. Pinning means the Service can be recreated without breaking
  # that reference.
  clusterIP: 10.43.208.74
  selector:
    app: tf2-bot
  ports:
    - port: 27115
      targetPort: 27115
      protocol: UDP
